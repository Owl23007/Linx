spring:
  # Production database configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/linx_db?useSSL=false&serverTimezone=UTC
    driverClassName: org.postgresql.Driver
    username: linx_service
    password: ${DB_PASSWORD:linx}

  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        username: nacos
        password: ${nacos.password}

  # JPA Configuration for production
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 20
        order_inserts: true

# Logging configuration for production
logging:
  level:
    root: WARN
    com.linx: INFO