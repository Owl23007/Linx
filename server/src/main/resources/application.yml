spring:
  application:
    name: linx
  profiles:
    active: dev

# Server configuration
server:
  port: 8080

service:
  pathPrefix: /api/linx

# JWT Configuration
jwt:
  secret: linx-secret-key-change-in-production
  expiration: 86400000

# Logging configuration
logging:
  level:
    root: INFO
    com.linx: DEBUG