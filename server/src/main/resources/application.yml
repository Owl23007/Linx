spring:
  application:
    name: linx
  main:
    allow-bean-definition-overriding: true
  profiles:
    active: dev

  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

# Server configuration
server:
  port: 8082

# Logging configuration
logging:
  level:
    root: INFO
    com.linx: DEBUG