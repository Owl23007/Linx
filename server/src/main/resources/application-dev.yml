spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/linx_service?useUnicode=true&characterEncoding=UTF-8&serverTimezone=GMT%2B8&useSSL=false
    username: root
    password: W123456

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

# Server Configuration
server:
  port: 8080

# Logging configuration for development
logging:
  level:
    root: INFO
    com.linx: DEBUG


service:
  serverLocate: http://localhost:${server.port}/

upstream:
  auth-service:
    endpoint: http://localhost:8081
    secret: linx-shared-secret-2025!