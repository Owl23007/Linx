spring:
  application:
    name: server

  # H2 Database Configuration
  datasource:
    url: jdbc:h2:mem:linxdb
    driverClassName: org.h2.Driver
    username: sa
    password:

  # JPA Configuration
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # H2 Console (for development)
  h2:
    console:
      enabled: true
      path: /h2-console

# JWT Configuration
jwt:
  secret: linx-secret-key-for-development-only-change-in-production
  expiration: 86400000

# WebSocket Configuration
server:
  port: 8080
