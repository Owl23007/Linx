spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/linx_service?useUnicode=true&characterEncoding=UTF-8&serverTimezone=GMT%2B8&useSSL=false
    username: root
    password: W123456

  # JPA Configuration for development
  jpa:
    database-platform: org.hibernate.dialect.MySQL8Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# JWT Configuration
jwt:
  secret: secret-key-for-development-only
  expiration: 86400000

# Server Configuration
server:
  port: 8080

# Logging configuration for development
logging:
  level:
    root: INFO
    com.linx: DEBUG


service:
  serverLocate: http://localhost:${server.port}/

upstream:
  auth-service:
    endpoint: http://localhost:8081
    secret: linx-shared-secret-2025!