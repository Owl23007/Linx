spring:
  application:
    name: server

  # H2 Database Configuration for testing
  datasource:
    url: jdbc:h2:mem:testdb
    driverClassName: org.h2.Driver
    username: sa
    password:

  # JPA Configuration for testing
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # H2 Console (for testing)
  h2:
    console:
      enabled: true
      path: /h2-console

# JWT Configuration
jwt:
  secret: linx-secret-key-for-testing-only-change-in-production
  expiration: 86400000

# Server Configuration
server:
  port: 8080

# Logging configuration for testing
logging:
  level:
    root: INFO
    com.linx: DEBUG