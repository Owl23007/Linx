<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - Linx</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }

        .error-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 90%;
            text-align: center;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .error-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .error-title {
            color: #e74c3c;
            font-size: 28px;
            margin-bottom: 15px;
            font-weight: 600;
            line-height: 1.2;
        }

        .error-message {
            color: #555;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 30px;
            padding: 0 10px;
        }

        .error-details {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #666;
            text-align: left;
            display: none;
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: #3498db;
            color: white;
        }

        .btn-primary:hover {
            background: #2980b9;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #95a5a6;
            color: white;
        }

        .btn-secondary:hover {
            background: #7f8c8d;
            transform: translateY(-2px);
        }

        .btn-details {
            background: transparent;
            color: #7f8c8d;
            border: 1px solid #bdc3c7;
        }

        .btn-details:hover {
            background: #ecf0f1;
            border-color: #95a5a6;
        }

        .app-info {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
            font-size: 12px;
            color: #999;
        }

        @media (max-width: 480px) {
            .error-container {
                padding: 30px 20px;
                margin: 20px;
            }

            .error-title {
                font-size: 24px;
            }

            .button-group {
                flex-direction: column;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-icon">⚠️</div>
        <h1 class="error-title" id="errorTitle">发生错误</h1>
        <p class="error-message" id="errorMessage">抱歉，应用程序遇到了一个问题。</p>

        <div class="error-details" id="errorDetails">
            <strong>错误详情：</strong><br>
            <span id="errorDetailsContent">无可用详情</span>
        </div>

        <div class="button-group">
            <button class="btn btn-primary" onclick="closeWindow()">
                <span>🔄</span>
                关闭窗口
            </button>
            <button class="btn btn-secondary" onclick="reloadApp()">
                <span>↻</span>
                重新加载
            </button>
            <button class="btn btn-details" onclick="toggleDetails()">
                <span>📋</span>
                查看详情
            </button>
        </div>

        <div class="app-info">
            <p>Linx - 即时通讯应用</p>
            <p>如果问题持续存在，请联系技术支持</p>
        </div>
    </div>

    <script>
        // 从URL参数获取错误信息
        function getUrlParams() {
            const urlParams = new URLSearchParams(window.location.search);
            return {
                title: urlParams.get('title') || '发生错误',
                message: urlParams.get('message') || '抱歉，应用程序遇到了一个问题。',
                details: urlParams.get('details') || null
            };
        }

        // 初始化页面
        function initPage() {
            const params = getUrlParams();

            document.getElementById('errorTitle').textContent = params.title;
            document.getElementById('errorMessage').textContent = params.message;

            if (params.details) {
                document.getElementById('errorDetailsContent').textContent = params.details;
            }

            // 设置页面标题
            document.title = `${params.title} - Let's Talk`;
        }

        // 关闭窗口
        function closeWindow() {
            if (window.electronAPI) {
                // 如果在Electron环境中
                window.electronAPI.closeWindow();
            } else {
                // 浏览器环境
                window.close();
            }
        }

        // 重新加载应用
        function reloadApp() {
            if (window.electronAPI) {
                window.electronAPI.reloadApp();
            } else {
                window.location.reload();
            }
        }

        // 切换详情显示
        function toggleDetails() {
            const details = document.getElementById('errorDetails');
            const btn = event.target.closest('.btn-details');

            if (details.style.display === 'none' || !details.style.display) {
                details.style.display = 'block';
                btn.innerHTML = '<span>📋</span>隐藏详情';
            } else {
                details.style.display = 'none';
                btn.innerHTML = '<span>📋</span>查看详情';
            }
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', initPage);

        // 键盘快捷键
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeWindow();
            } else if (e.key === 'F5' || (e.ctrlKey && e.key === 'r')) {
                e.preventDefault();
                reloadApp();
            }
        });
    </script>
</body>
</html>
