name: "Copilot Setup Steps"

# Automatically run the setup steps when they are changed to allow for easy validation, and
# allow manual testing through the repository's "Actions" tab
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # The job MUST be called `copilot-setup-steps` or it will not be picked up by Copilot.
  copilot-setup-steps:
    runs-on: ubuntu-latest

    # Set the permissions to the lowest permissions possible needed for your steps.
    # Copilot will be given its own token for its operations.
    permissions:
      # If you want to clone the repository as part of your setup steps, for example to install dependencies, you'll need the `contents: read` permission. If you don't clone the repository in your setup steps, Copilot will do this for you automatically after the steps complete.
      contents: read

    # You can define any steps you want, and they will run before the agent starts.
    # If you do not check out your code, Copilot will do this for you.
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up Java 17 for Spring Boot backend
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Set up Node.js for Vue.js + Electron frontend
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package.json
            front/package.json

      # Install root package dependencies (for scripts and hooks)
      - name: Install root dependencies
        run: npm install

      # Install Maven dependencies for server
      - name: Install server dependencies
        working-directory: ./server
        run: |
          chmod +x mvnw
          ./mvnw dependency:resolve-sources -B -q

      # Install npm dependencies for frontend
      - name: Install frontend dependencies
        working-directory: ./front
        run: npm ci

      # Verify Java environment
      - name: Verify Java installation
        run: |
          java -version
          mvn -version

      # Verify Node.js environment
      - name: Verify Node.js installation
        run: |
          node --version
          npm --version

      # Cache additional Maven dependencies that might be needed
      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # Install git hooks if needed
      - name: Install git hooks
        run: npm run install-hooks
        continue-on-error: true
