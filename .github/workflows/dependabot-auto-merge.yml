name: Dependabot Auto Merge

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  check_suite:
    types: [completed]
  workflow_dispatch:
    inputs:
      pr-number:
        description: '手动指定要合并的 Dependabot PR 编号（可选）'
        required: false
        type: string
      merge-all-open:
        description: '是否自动查找并尝试合并所有开放的 Dependabot PR？'
        required: false
        type: boolean
        default: false

permissions:
  pull-requests: write
  contents: write
  checks: read

jobs:
  auto-merge:
    name: Auto Merge Dependabot PR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Determine PR(s) to process
        id: find-prs
        uses: actions/github-script@v7
        with:
          script: |
            const inputs = {
              prNumber: '${{ github.event.inputs.pr-number }}'.trim() || null,
              mergeAllOpen: ('${{ github.event.inputs.merge-all-open }}' == 'true'),
            };

            let prNumbers = [];

            // 1. 优先处理手动指定的 PR
            if (inputs.prNumber) {
              const num = parseInt(inputs.prNumber, 10);
              if (!isNaN(num) && num > 0) {
                prNumbers.push(num);
                console.log(`📌 手动模式：处理 PR #${num}`);
              } else {
                core.setFailed('无效的 PR 编号');
                return;
              }
            }
            // 2. 处理 workflow_dispatch + merge-all-open
            else if (inputs.mergeAllOpen && context.eventName === 'workflow_dispatch') {
              console.log('🔍 手动模式：查找所有开放的 Dependabot PR...');
              const { data: prs } = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                per_page: 100
              });
              for (const pr of prs) {
                if (pr.user?.login === 'dependabot[bot]') {
                  prNumbers.push(pr.number);
                }
              }
              console.log(`📌 找到 ${prNumbers.length} 个开放的 Dependabot PR` + (prNumbers.length > 0 ? `: #${prNumbers.join(', #')}` : ''));
            }
            // 3. 自动事件（pull_request / check_suite）
            else if (context.eventName === 'pull_request') {
              const pr = context.payload.pull_request;
              if (pr && pr.user?.login === 'dependabot[bot]') {
                prNumbers.push(pr.number);
                console.log(`🔄 自动模式（pull_request）：处理 PR #${pr.number}`);
              }
            }
            else if (context.eventName === 'check_suite') {
              const prs = context.payload.check_suite?.pull_requests || [];
              for (const prRef of prs) {
                const { data: pr } = await github.rest.pulls.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prRef.number
                });
                if (pr.user?.login === 'dependabot[bot]') {
                  prNumbers.push(pr.number);
                }
              }
              if (prNumbers.length > 0) {
                console.log(`🔄 自动模式（check_suite）：关联 PR #${prNumbers.join(', #')}`);
              }
            }

            if (prNumbers.length === 0) {
              console.log('ℹ️ 未找到需要处理的 Dependabot PR');
              core.setOutput('pr-numbers', '[]');
              return;
            }

            core.setOutput('pr-numbers', JSON.stringify(prNumbers));
            core.setOutput('has-prs', 'true');

      - name: Process Each PR
        if: steps.find-prs.outputs.has-prs == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumbers = JSON.parse('${{ steps.find-prs.outputs.pr-numbers }}');
            const results = [];

            for (const prNumber of prNumbers) {
              try {
                console.log(`\n--- 处理 PR #${prNumber} ---`);

                const { data: pr } = await github.rest.pulls.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber
                });

                // 验证是 Dependabot
                if (pr.user?.login !== 'dependabot[bot]') {
                  console.log(`❌ 跳过：PR #${prNumber} 不是 Dependabot 创建`);
                  results.push({ pr: prNumber, status: 'skipped', reason: 'not_dependabot' });
                  continue;
                }

                // 检查状态
                const isDraft = pr.draft || false;
                const stateOk = pr.state === 'open';
                const mergeableOk = pr.mergeable === true;
                const mergeableStateOk = pr.mergeable_state === 'clean';

                console.log(`状态: draft=${isDraft}, state=${pr.state}, mergeable=${pr.mergeable}, mergeable_state=${pr.mergeable_state}`);

                if (!stateOk) {
                  console.log(`❌ PR #${prNumber} 已关闭，跳过`);
                  results.push({ pr: prNumber, status: 'skipped', reason: 'not_open' });
                  continue;
                }

                if (isDraft) {
                  console.log(`⚠️ PR #${prNumber} 是草稿，跳过`);
                  results.push({ pr: prNumber, status: 'skipped', reason: 'draft' });
                  continue;
                }

                if (!mergeableOk || !mergeableStateOk) {
                  console.log(`⚠️ PR #${prNumber} 存在冲突或未通过检查，暂不合并`);
                  results.push({ pr: prNumber, status: 'not_mergeable', reason: pr.mergeable_state || 'conflict' });
                  continue;
                }

                // 执行合并（squash）
                await github.rest.pulls.merge({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                  merge_method: 'squash'
                });

                console.log(`✅ 成功合并 PR #${prNumber}`);
                results.push({ pr: prNumber, status: 'merged' });

                // 评论
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  body: '✅ 依赖更新已通过检查，自动合并完成。'
                });

              } catch (error) {
                console.error(`💥 合并 PR #${prNumber} 失败:`, error.message);
                results.push({ pr: prNumber, status: 'error', reason: error.message });
              }
            }

            // 最终汇总
            const merged = results.filter(r => r.status === 'merged').length;
            const failed = results.filter(r => r.status === 'error').length;
            console.log(`\n📊 处理完成：共 ${prNumbers.length} 个 PR，成功合并 ${merged} 个，失败 ${failed} 个`);

            if (failed > 0) {
              core.setFailed(`有 ${failed} 个 PR 合并失败，请查看日志`);
            }
