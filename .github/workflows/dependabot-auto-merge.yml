name: Dependabot Auto Merge

on:
  pull_request:
    types: [opened, synchronize, reopened]
  check_suite:
    types: [completed]
  workflow_dispatch:
    inputs:
      pr-number:
        description: 'PR 号码 (留空则自动检测最新 Dependabot PR)'
        required: false
        type: string

permissions:
  pull-requests: write
  contents: write

jobs:
  auto-merge:
    name: Auto Merge Dependabot PR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get PR Details
        id: pr-details
        uses: actions/github-script@v7
        with:
          script: |
            // 优先使用手动输入的 PR 号码
            const manualPrNumber = '${{ github.event.inputs.pr-number }}';
            let prNumber = null;
            let isDependabot = false;

            if (manualPrNumber) {
              prNumber = parseInt(manualPrNumber);
              console.log(`📌 使用手动指定的 PR 号码: #${prNumber}`);
            } else {
              // 从 pull_request 事件获取
              const pr = context.payload.pull_request;
              if (!pr) {
                console.log('ℹ️ 未获取到 PR 信息，跳过处理');
                return;
              }
              prNumber = pr.number;
            }

            // 获取 PR 详情
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            // 验证是 Dependabot 创建的 PR
            if (pr.user.login !== 'dependabot[bot]') {
              if (manualPrNumber) {
                console.log(`❌ PR #${prNumber} 不是由 Dependabot 创建`);
                core.setFailed(`PR #${prNumber} created by ${pr.user.login}, not Dependabot`);
              } else {
                console.log(`⏭️ PR #${prNumber} 不是 Dependabot 创建，跳过`);
              }
              return;
            }

            isDependabot = true;
            console.log(`✅ 找到 Dependabot PR #${prNumber}: ${pr.title}`);
            core.setOutput('pr-number', prNumber);
            core.setOutput('is-dependabot', 'true');

      - name: Check PR Status
        id: check-status
        if: ${{ steps.pr-details.outputs.is-dependabot == 'true' }}
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = ${{ steps.pr-details.outputs.pr-number }};

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            console.log('PR Status:', {
              number: pr.number,
              draft: pr.draft,
              mergeable: pr.mergeable,
              mergeable_state: pr.mergeable_state,
              state: pr.state
            });

            // 检查是否可以合并
            const canMerge = !pr.draft &&
                            pr.mergeable &&
                            pr.mergeable_state === 'clean' &&
                            pr.state === 'open';

            if (canMerge) {
              console.log(`✅ PR #${prNumber} 满足合并条件`);
            } else {
              console.log(`❌ PR #${prNumber} 不满足合并条件`);
            }

            core.setOutput('can-merge', canMerge ? 'true' : 'false');
            core.setOutput('pr-number', prNumber);

      - name: Enable Auto Merge
        if: ${{ steps.check-status.outputs.can-merge == 'true' }}
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = ${{ steps.check-status.outputs.pr-number }};

            try {
              // 启用自动合并
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                merge_method: 'squash'
              });

              console.log(`✅ PR #${prNumber} 已自动合并`);
            } catch (error) {
              console.log(`⚠️ 无法合并 PR #${prNumber}: ${error.message}`);
            }

      - name: Comment on PR
        if: ${{ steps.check-status.outputs.pr-number }}
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = ${{ steps.check-status.outputs.pr-number }};
            const canMerge = '${{ steps.check-status.outputs.can-merge }}' === 'true';

            if (canMerge) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: '✅ CI 检查全部通过，已自动合并此 PR'
              });
            }
