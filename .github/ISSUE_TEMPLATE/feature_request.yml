name: ✨ 功能请求
description: 提出一个新功能建议
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢您的功能建议！请填写以下信息帮助我们更好地理解您的需求。

  - type: textarea
    id: problem
    attributes:
      label: 问题描述
      description: 描述您希望解决的问题或改进的方面
      placeholder: 我在使用时遇到了这样的问题...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的解决方案
      description: 描述您期望的功能或解决方案
      placeholder: 我希望能够...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 描述您考虑过的任何替代解决方案
      placeholder: 我也考虑过...

  - type: dropdown
    id: importance
    attributes:
      label: 重要程度
      options:
        - 高 - 严重影响使用
        - 中 - 会提升体验
        - 低 - 锦上添花
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: 其他信息
      description: 任何其他相关信息或截图
