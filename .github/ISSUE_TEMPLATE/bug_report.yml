name: 🐛 Bug 报告
description: 报告一个 Bug
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢您提交 Bug 报告！请填写以下信息帮助我们更快地定位和解决问题。

  - type: textarea
    id: description
    attributes:
      label: Bug 描述
      description: 清晰简洁地描述这个 Bug
      placeholder: 描述你遇到的问题...
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 描述复现此 Bug 的步骤
      placeholder: |
        1. 打开应用
        2. 点击 '...'
        3. 滚动到 '...'
        4. 出现错误
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 描述你期望发生的行为
      placeholder: 应该发生什么...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 描述实际发生的行为
      placeholder: 实际发生了什么...
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: 操作系统
      options:
        - Windows
        - macOS
        - Linux
        - 其他
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: 应用版本
      description: 你使用的 Linx 版本
      placeholder: v0.0.1
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 相关日志
      description: 如有相关错误日志，请粘贴在此处
      render: shell

  - type: textarea
    id: screenshots
    attributes:
      label: 截图
      description: 如有相关截图，请上传

  - type: textarea
    id: additional
    attributes:
      label: 其他信息
      description: 任何其他可能有助于解决此问题的信息
